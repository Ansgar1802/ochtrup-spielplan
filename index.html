<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TC 1928 Ochtrup – Spielplan 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f1117;
    font-family: 'DM Sans', sans-serif;
    color: #e8eaf0;
    padding: 24px 16px 48px;
    max-width: 640px;
    margin: 0 auto;
  }

  .header { text-align: center; margin-bottom: 20px; }
  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 0.08em;
    color: #fff;
    line-height: 1;
  }
  .header p {
    color: #7a7f96;
    font-size: 0.75rem;
    margin-top: 5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ── Next match box ── */
  .next-match-box {
    background: #1a1d2e;
    border: 1px solid #252840;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 14px;
    display: none;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .nm-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #c0c4d8;
    margin-bottom: 5px;
  }
  .nm-teams {
    font-size: 1.05rem;
    font-weight: 600;
    color: #fff;
    line-height: 1.3;
  }
  .nm-date { font-size: 0.88rem; color: #c8cae0; margin-top: 3px; }
  .nm-right { text-align: right; flex-shrink: 0; }
  .nm-days {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.6rem;
    line-height: 1;
    color: #7ab3ff;
  }
  .nm-days.today { font-size: 1.5rem; color: #7effa8; }
  .nm-unit {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #9095b0;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
  }
  .controls-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }
  .btn {
    padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid #2e3150;
    background: transparent;
    color: #555a7a;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.71rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
    user-select: none;
  }
  .btn:hover { background: #1a1d2e; color: #9095b0; border-color: #444a68; }
  .btn.on    { color: #fff; font-weight: 700; }

  .btn-filter.on { border-color: #9095b0; background: rgba(144,149,176,0.08); }
  .btn-mannschaften {
    width: 100%;
    padding: 6px;
    border-radius: 20px;
    border: 1px solid #2e3150;
    background: transparent;
    color: #555a7a;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.71rem;
    font-weight: 600;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    transition: all 0.15s;
    user-select: none;
  }
  .btn-mannschaften:hover { background: #1a1d2e; color: #9095b0; border-color: #444a68; }
  .btn-mannschaften.on { color: #fff; font-weight: 700; border-color: #9095b0; background: rgba(144,149,176,0.08); }
  .team-row { display: none; }
  .team-row .btn { color: #9095b0; }
  .team-row.visible { display: flex; flex-direction: column; gap: 6px; align-items: flex-start; }
  .btn-select-all  { color: #7effa8 !important; border-color: #2a9050; }
  .btn-select-all:hover  { background: rgba(30,160,80,0.12) !important; border-color: #7effa8 !important; color: #7effa8 !important; }
  .btn-select-none { color: #ff9090 !important; border-color: #802020; }
  .btn-select-none:hover { background: rgba(220,50,50,0.12) !important; border-color: #ff9090 !important; color: #ff9090 !important; }
  .top-btns-row { display: flex; width: 100%; gap: 6px; }
  .top-btns-row .btn { flex: 1; text-align: center; min-width: 0; padding-top: 17px; padding-bottom: 17px; white-space: normal; line-height: 1.4; }
  .btn-meine-auswahl { color: #c8a000 !important; border-color: #6a5400; -webkit-touch-callout: none; touch-action: none; }
  .btn-meine-auswahl:hover { background: rgba(200,160,0,0.12) !important; border-color: #c8a000 !important; color: #ffe066 !important; }
  .btn-meine-auswahl.on { color: #ffe066 !important; border-color: #c8a000 !important; background: rgba(200,160,0,0.15) !important; font-weight: 700; }
  .btn-classic.on{ border-color: #7ab3ff; background: rgba(30,90,200,0.12); }
  .btn-2er.on    { border-color: #7effa8; background: rgba(30,160,80,0.12); }
  .btn-mixed.on  { border-color: #ffe57f; background: rgba(200,170,20,0.12); }
  .btn-u8.on     { border-color: #ff9f7f; background: rgba(200,80,30,0.12); }
  .btn-u10.on    { border-color: #d07fff; background: rgba(130,40,200,0.12); }
  .btn-d4.on    { border-color: #ff7fad; background: rgba(220,50,120,0.12); }
  .btn-d30bz.on { border-color: #ff9966; background: rgba(220,100,30,0.12); }
  .btn-d30kl.on { border-color: #ffcc44; background: rgba(200,160,20,0.12); }
  .btn-d40.on   { border-color: #ff5588; background: rgba(220,30,90,0.12); }
  .btn-d50.on   { border-color: #dd88ff; background: rgba(170,50,230,0.12); }
  .btn-d60.on   { border-color: #ff8866; background: rgba(220,90,50,0.12); }
  .btn-h4.on    { border-color: #55bbff; background: rgba(20,130,220,0.12); }
  .btn-h30kl.on { border-color: #dca000; background: rgba(220,160,0,0.12); }
  .btn-h30k3.on { border-color: #28aae6; background: rgba(40,170,230,0.12); }
  .btn-h40bk.on { border-color: #44ddaa; background: rgba(20,180,130,0.12); }
  .btn-h40kl.on { border-color: #88ee66; background: rgba(70,190,40,0.12); }
  .btn-h50.on   { border-color: #22ddee; background: rgba(10,170,200,0.12); }
  .btn-h60.on   { border-color: #6688ff; background: rgba(60,100,230,0.12); }
  .btn-h65kl.on { border-color: #44eecc; background: rgba(20,190,170,0.12); }
  .btn-h65ml.on { border-color: #aabbff; background: rgba(100,120,230,0.12); }

  .btn-refresh {
    margin-left: auto;
    font-size: 1rem;
    padding: 3px 10px;
    letter-spacing: 0;
  }
  .btn-refresh:disabled { opacity: 0.4; cursor: default; }
  .btn-refresh.spinning { animation: spin 0.7s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Cards ── */
  .card {
    border-radius: 12px;
    margin-bottom: 10px;
    padding: 12px 14px;
    border: 1px solid transparent;
  }
  .card.u15-classic { background: rgba(30,90,200,0.2);  border-color: rgba(30,90,200,0.25); }
  .card.u15-2er     { background: rgba(30,160,80,0.2);  border-color: rgba(30,160,80,0.25); }
  .card.u8-klein    { background: rgba(200,80,30,0.2);  border-color: rgba(200,80,30,0.25); }
  .card.u10-gross   { background: rgba(130,40,200,0.2); border-color: rgba(130,40,200,0.25); }
  .card.mixed       { background: rgba(200,170,20,0.2); border-color: rgba(200,170,20,0.25); }
  .card.d4    { background: rgba(220,50,120,0.2);  border-color: rgba(220,50,120,0.25); }
  .card.d30bz { background: rgba(220,100,30,0.2);  border-color: rgba(220,100,30,0.25); }
  .card.d30kl { background: rgba(200,160,20,0.2);  border-color: rgba(200,160,20,0.25); }
  .card.d40   { background: rgba(220,30,90,0.2);   border-color: rgba(220,30,90,0.25); }
  .card.d50   { background: rgba(170,50,230,0.2);  border-color: rgba(170,50,230,0.25); }
  .card.d60   { background: rgba(220,90,50,0.2);   border-color: rgba(220,90,50,0.25); }
  .card.h4    { background: rgba(20,130,220,0.2);  border-color: rgba(20,130,220,0.25); }
  .card.h30kl { background: rgba(220,160,0,0.2);   border-color: rgba(220,160,0,0.25); }
  .card.h30k3 { background: rgba(40,170,230,0.2);  border-color: rgba(40,170,230,0.25); }
  .card.h40bk { background: rgba(20,180,130,0.2);  border-color: rgba(20,180,130,0.25); }
  .card.h40kl { background: rgba(70,190,40,0.2);   border-color: rgba(70,190,40,0.25); }
  .card.h50   { background: rgba(10,170,200,0.2);  border-color: rgba(10,170,200,0.25); }
  .card.h60   { background: rgba(60,100,230,0.2);  border-color: rgba(60,100,230,0.25); }
  .card.h65kl { background: rgba(20,190,170,0.2);  border-color: rgba(20,190,170,0.25); }
  .card.h65ml { background: rgba(100,120,230,0.2); border-color: rgba(100,120,230,0.25); }
  .card.home-game   { border-color: #fff !important; border-width: 2px; }
  .card.past-game   { opacity: 0.55; }
  .past-divider     { height: 32px; }

  /* ── Detail-View (Tabelle) ── */
  #detail-view { display: none; }
  .detail-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }
  .btn-back {
    background: none;
    border: 1px solid #3a3f5c;
    color: #9095b0;
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-back:hover { border-color: #7a7f96; color: #e8eaf0; }
  .detail-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.06em;
    color: #fff;
  }
  .standings-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
  }
  .standings-table th {
    text-align: center;
    color: #7a7f96;
    font-weight: 600;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 6px 4px;
    border-bottom: 1px solid #252840;
  }
  .standings-table th:nth-child(2) { text-align: left; }
  .standings-table td {
    text-align: center;
    padding: 8px 4px;
    border-bottom: 1px solid #1a1d2e;
    color: #c8cad8;
  }
  .standings-table td:nth-child(2) { text-align: left; color: #e8eaf0; }
  .standings-table tr.ochtrup-row td { color: #fff; font-weight: 600; }
  .standings-table tr.ochtrup-row td:nth-child(2) { color: #7ab3ff; }

  /* ── Report-View ── */
  #report-view { display: none; }
  .report-match-header {
    background: #1a1d2e;
    border: 1px solid #252840;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 18px;
    text-align: center;
  }
  .report-teams {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.06em;
    color: #fff;
    line-height: 1.2;
  }
  .report-result {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: #7ab3ff;
    margin: 4px 0 2px;
  }
  .report-date { font-size: 0.78rem; color: #9095b0; }
  .report-section {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.06em;
    color: #9095b0;
    margin: 18px 0 8px;
  }
  .report-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.72rem;
  }
  .report-table th {
    text-align: center;
    color: #7a7f96;
    font-size: 0.63rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 5px 3px;
    border-bottom: 1px solid #252840;
    font-weight: 600;
  }
  .report-table th:nth-child(1),
  .report-table th:nth-child(2) { text-align: left; }
  .report-table td {
    text-align: center;
    padding: 7px 3px;
    border-bottom: 1px solid #1a1d2e;
    color: #c8cad8;
    vertical-align: top;
  }
  .report-table td:nth-child(1),
  .report-table th:nth-child(1),
  .report-table td:nth-child(3),
  .report-table th:nth-child(3) { width: 1px; white-space: nowrap; }
  .report-table td:nth-child(1),
  .report-table td:nth-child(2),
  .report-table td:nth-child(4) { text-align: left; color: #e8eaf0; }
  .report-table tr.total-row td { color: #fff; font-weight: 700; border-top: 1px solid #3a3f5c; border-bottom: none; text-align: center; }
  .report-table tr.ochtrup-player td { color: #fff; }
  .set-win  { color: #7effa8; font-weight: 600; }
  .set-loss { color: #ff7f7f; }

  .card-tag-row {
    text-align: center;
    margin-bottom: 7px;
  }
  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    gap: 8px;
  }
  .card-date {
    font-size: 0.78rem;
    color: #9095b0;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .card-time { font-size: 0.75rem; color: #666a85; margin-left: 4px; }
  .card-countdown { flex: 1; display: flex; justify-content: center; align-items: center; font-size: 0.75rem; color: #fff; font-weight: 700; white-space: nowrap; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .card-countdown.blink { animation: blink 1s step-end infinite; }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .tag-classic { background: rgba(30,90,200,0.4);  color: #fff; font-weight: 700; border: 1px solid #3060c0; }
  .tag-2er     { background: rgba(30,160,80,0.4);  color: #fff; font-weight: 700; border: 1px solid #2a9050; }
  .tag-mixed   { background: rgba(200,170,20,0.4); color: #fff; font-weight: 700; border: 1px solid #a08800; }
  .tag-u8      { background: rgba(200,80,30,0.4);  color: #fff; font-weight: 700; border: 1px solid #c04010; }
  .tag-u10     { background: rgba(130,40,200,0.4); color: #fff; font-weight: 700; border: 1px solid #8020c0; }
  .tag-d4    { background: rgba(220,50,120,0.4);  color: #fff; font-weight: 700; border: 1px solid #c03070; }
  .tag-d30bz { background: rgba(220,100,30,0.4);  color: #fff; font-weight: 700; border: 1px solid #b05010; }
  .tag-d30kl { background: rgba(200,160,20,0.4);  color: #fff; font-weight: 700; border: 1px solid #a08010; }
  .tag-d40   { background: rgba(220,30,90,0.4);   color: #fff; font-weight: 700; border: 1px solid #c01050; }
  .tag-d50   { background: rgba(170,50,230,0.4);  color: #fff; font-weight: 700; border: 1px solid #9030c0; }
  .tag-d60   { background: rgba(220,90,50,0.4);   color: #fff; font-weight: 700; border: 1px solid #b04020; }
  .tag-h4    { background: rgba(20,130,220,0.4);  color: #fff; font-weight: 700; border: 1px solid #1060b0; }
  .tag-h30kl { background: rgba(220,160,0,0.4);   color: #fff; font-weight: 700; border: 1px solid #a07800; }
  .tag-h30k3 { background: rgba(40,170,230,0.4);  color: #fff; font-weight: 700; border: 1px solid #1880b0; }
  .tag-h40bk { background: rgba(20,180,130,0.4);  color: #fff; font-weight: 700; border: 1px solid #10a070; }
  .tag-h40kl { background: rgba(70,190,40,0.4);   color: #fff; font-weight: 700; border: 1px solid #40a020; }
  .tag-h50   { background: rgba(10,170,200,0.4);  color: #fff; font-weight: 700; border: 1px solid #0090b0; }
  .tag-h60   { background: rgba(60,100,230,0.4);  color: #fff; font-weight: 700; border: 1px solid #3060c0; }
  .tag-h65kl { background: rgba(20,190,170,0.4);  color: #fff; font-weight: 700; border: 1px solid #10a090; }
  .tag-h65ml { background: rgba(100,120,230,0.4); color: #fff; font-weight: 700; border: 1px solid #6070c0; }

  .btn-tabelle {
    background: none;
    border: 1px solid #3a3f5c;
    border-radius: 6px;
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    padding: 2px 10px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-tabelle:hover { border-color: #7a7f96; color: #e8eaf0; }

  .card-match {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    row-gap: 2px;
  }
  .team          { font-size: 0.92rem; font-weight: 700; color: #fff; line-height: 1.3; }
  .team.opponent { font-weight: 400; color: #c0c4d8; }
  .vs { font-size: 0.75rem; color: #555a7a; font-style: italic; margin: 0 6px; flex-shrink: 0; }

  .result { font-size: 1.05rem; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .result.win  { color: #7effa8; }
  .result.loss { color: #ff7a7a; }
  .result.open { color: #444a68; font-style: italic; font-weight: 400; font-size: 0.9rem; }

  .note {
    font-size: 0.7rem;
    color: #555a7a;
    font-style: italic;
  }

  .card-bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-top: 6px;
  }

  /* ── Status ── */
  .status-msg {
    text-align: center;
    color: #555a7a;
    padding: 32px 16px;
    font-size: 0.85rem;
  }
  .loading-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: #555a7a;
    padding: 32px 16px;
    font-size: 0.85rem;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid #2e3150;
    border-top-color: #7ab3ff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  .error-msg {
    background: rgba(255,80,80,0.07);
    border: 1px solid rgba(255,80,80,0.22);
    border-radius: 10px;
    padding: 12px 14px;
    color: #ff9090;
    font-size: 0.77rem;
    margin-bottom: 12px;
    line-height: 1.6;
  }
  .error-msg code {
    font-family: monospace;
    background: rgba(255,255,255,0.08);
    padding: 1px 5px;
    border-radius: 3px;
  }
  .update-info {
    text-align: center;
    font-size: 0.63rem;
    color: #333650;
    margin-top: 24px;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<div class="header">
  <h1>TC 1928 Ochtrup</h1>
  <p>Spielplan · Münsterland · Sommer 2026</p>
</div>

<!-- Nächstes Spiel -->
<div id="next-match-box" class="next-match-box">
  <div>
    <div class="nm-label">Nächstes Spiel</div>
    <div class="nm-teams" id="nm-teams"></div>
    <div class="nm-date"  id="nm-date"></div>
  </div>
  <div class="nm-right">
    <div class="nm-days" id="nm-days"></div>
    <div class="nm-unit" id="nm-unit"></div>
  </div>
</div>

<!-- Filter-Buttons -->
<div class="controls">
  <div class="controls-row">
    <button class="btn btn-filter"    id="btn-vergangen" onclick="toggleFilter('showPast')">Vergangen</button>
    <button class="btn btn-filter on" id="btn-aktuell"   onclick="toggleFilter('showFuture')">Aktuell</button>
    <button class="btn btn-filter on" id="btn-heim"      onclick="toggleFilter('showHome')">Heim</button>
    <button class="btn btn-filter on" id="btn-auswaerts" onclick="toggleFilter('showAway')">Auswärts</button>
  </div>
  <button class="btn-mannschaften" id="btn-mannschaften" onclick="toggleMannschaften()">Mannschaften</button>
  <div class="team-row" id="team-row">
    <div class="top-btns-row">
      <button class="btn btn-select-all"    onclick="selectAllTeams()">Alle<br>auswählen</button>
      <button class="btn btn-select-none"   onclick="selectNoTeams()">Keine<br>auswählen</button>
      <button class="btn btn-meine-auswahl" id="btn-meine-auswahl">Meine<br>Auswahl</button>

/* ── Fetch ─────────────────────────────────────────────────── */
async function fetchURL(targetUrl) {
  const encoded = encodeURIComponent(targetUrl);
  const ctrls   = [new AbortController(), new AbortController(), new AbortController()];

  async function via(idx, url, isJson) {
    const timer = setTimeout(() => ctrls[idx].abort(), 10000);
    try {
      const res = await fetch(url, { signal: ctrls[idx].signal });
      clearTimeout(timer);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      if (isJson) {
        const j = await res.json();
        if (!j.contents || j.contents.length < 1000) throw new Error('Zu kurz');
        return j.contents;
      }
      const t = await res.text();
      if (t.length < 500) throw new Error('Zu kurz');
      return t;
    } catch(e) { clearTimeout(timer); throw e; }
  }

  /* Alle drei Proxies gleichzeitig — schnellster gewinnt, die anderen werden abgebrochen */
  try {
    const result = await Promise.any([
      via(0, 'https://api.allorigins.win/get?url=' + encoded, true),
      via(1, 'https://corsproxy.io/?' + encoded, false),
      via(2, 'https://api.allorigins.win/raw?url=' + encoded, false),
    ]);
    ctrls.forEach(c => c.abort());
    return result;
  } catch {
    throw new Error('Alle Proxies fehlgeschlagen');
  }
}

/* ── Parse ─────────────────────────────────────────────────── */
function toDate(ddmmyyyy) {
  const m = ddmmyyyy.match(/(\d{2})\.(\d{2})\.(\d{4})/);
  return m ? new Date(+m[3], +m[2] - 1, +m[1]) : null;
}

/* Gibt true zurück wenn der Text kein Datum, keine Uhrzeit, kein Ergebnis und kein Status ist */
function looksLikeTeam(t) {
  if (!t || t.length < 4)          return false;  // "Fr.", "Mo." etc. herausfiltern
  if (/\d{2}\.\d{2}\.\d{4}/.test(t)) return false;   // Datum
  if (/^\d{2}:\d{2}$/.test(t))     return false;     // Uhrzeit
  if (/^\d+:\d+$/.test(t))         return false;     // Ergebnis
  const low = t.toLowerCase();
  if (low === 'offen' || low === 'anzeigen' || low.includes('zurückgezogen')) return false;
  return true;
}

function parseLeague(html, league) {
  const doc     = new DOMParser().parseFromString(html, 'text/html');
  const matches = [];
  let lastDateStr = '';
  let lastTimeStr = '??:??';

  for (const row of doc.querySelectorAll('table tr')) {
    const cells = [...row.querySelectorAll('td')];
    if (cells.length < 3) continue;

    const texts = cells.map(c => c.textContent.trim());

    /* Datum aus JEDER Zeile lesen und vorwärts merken.
       liga.nu zeigt das Datum oft nur in einer Kopfzeile, die nachfolgenden
       Spielzeilen haben dann leere Datumszellen. */
    for (const t of texts) {
      const m = t.match(/(\d{2}\.\d{2}\.\d{4})/);
      if (m) {
        lastDateStr = m[1];
        const tm = t.match(/(\d{2}:\d{2})/);
        lastTimeStr = tm ? tm[1] : '??:??';
        break;
      }
    }

    /* Ochtrup in dieser Zeile? */
    if (!texts.some(t => t.includes('Ochtrup'))) continue;

    /* Zuletzt gesehenes Datum und Uhrzeit verwenden */
    const dateStr = lastDateStr;
    const timeStr = lastTimeStr;
    if (!dateStr) continue;

    /* Die ersten zwei Team-ähnlichen Zellen = Heim / Gast */
    const teamTexts = texts.filter(looksLikeTeam);
    if (teamTexts.length < 2) continue;

    const homeTeam = teamTexts[0];
    const awayTeam = teamTexts[1];

    if (!homeTeam.includes('Ochtrup') && !awayTeam.includes('Ochtrup')) continue;

    /* Ergebnis: erste Zelle die genau X:Y enthält (keine Sub-Ergebnisse) */
    let result = 'offen';
    for (const t of texts) {
      if (/^\d+:\d+$/.test(t)) { result = t; break; }
    }
    if (result === 'offen') {
      for (const t of texts) {
        if (t.toLowerCase().includes('zurückgezogen')) { result = 'zurückgezogen'; break; }
      }
    }

    /* Verlegungshinweis erkennen */
    let note = '';
    for (const t of texts) {
      if (t.toLowerCase().startsWith('ursprünglich')) { note = t; break; }
    }

    if (result === 'zurückgezogen') continue;

    /* Spielbericht-Link ("anzeigen") extrahieren */
    let reportUrl = '';
    for (const cell of cells) {
      const a = cell.querySelector('a[href*="meetingReport"]');
      if (a) {
        const href = a.getAttribute('href');
        reportUrl = href.startsWith('http') ? href : 'https://wtv.liga.nu' + href;
        break;
      }
    }

    const date = toDate(dateStr);
    if (!date) continue;

    matches.push({
      dateStr, timeStr, date,
      homeTeam, awayTeam, result, note, reportUrl,
      isHome: homeTeam.includes('Ochtrup'),
      team:   league.team,
      label:  league.label
    });
  }

  console.log('[' + league.label + '] ' + html.length +
    ' B | Ochtrup: ' + html.includes('Ochtrup') +
    ' | gefunden: ' + matches.length);

  return matches;
}

/* ── Laden ─────────────────────────────────────────────────── */
async function loadAllData() {
  const errBanner = document.getElementById('error-banner');
  const loadBanner = document.getElementById('loading-banner');
  const refreshBtn = document.getElementById('btn-refresh');

  errBanner.style.display  = 'none';
  loadBanner.style.display = 'flex';
  document.getElementById('matches-container').innerHTML = '';
  document.getElementById('next-match-box').style.display = 'none';
  document.getElementById('update-info').style.display = 'none';
  refreshBtn.disabled = true;
  refreshBtn.classList.add('spinning');

  /* Alle Ligen parallel laden – jede wird sofort angezeigt sobald sie fertig ist */
  allMatches = [];
  const errors = [];

  await Promise.allSettled(
    LEAGUES.map(league =>
      fetchURL(league.url)
        .then(html => {
          leagueHtml[league.team] = html;
          allMatches = [...allMatches, ...parseLeague(html, league)]
            .sort((a, b) => a.date - b.date);
          renderNextMatch();
          renderMatches();
        })
        .catch(e => { errors.push(league.label + ': ' + e.message); })
    )
  );

  refreshBtn.disabled = false;
  refreshBtn.classList.remove('spinning');
  loadBanner.style.display = 'none';

  if (errors.length) {
    errBanner.innerHTML =
      '<strong>⚠ Fehler beim Laden:</strong><br>' + errors.join('<br>');
    errBanner.style.display = 'block';
  }

  if (!allMatches.length) {
    errBanner.innerHTML =
      '<strong>⚠ Keine Spieldaten gefunden</strong><br>' +
      'Mögliche Ursache: liga.nu blockiert den CORS-Proxy.<br>' +
      errors.join('<br>');
    errBanner.style.display = 'block';
    document.getElementById('matches-container').innerHTML = '';
    return;
  }

  const ui = document.getElementById('update-info');
  const now = new Date();
  ui.textContent = 'Zuletzt aktualisiert: ' +
    now.toLocaleDateString('de-DE') + ' · ' +
    now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }) + ' Uhr';
  ui.style.display = 'block';
}

/* ── Nächstes Spiel ────────────────────────────────────────── */
function renderNextMatch() {
  const today = new Date(); today.setHours(0, 0, 0, 0);

  const next = allMatches.find(m => {
    const d = new Date(m.date); d.setHours(0, 0, 0, 0);
    return d >= today && showFuture && showTeams[m.team] && (m.isHome ? showHome : showAway);
  });
  if (!next) return;

  const opponent = next.isHome ? next.awayTeam : next.homeTeam;
  const prefix   = next.isHome ? 'Heim gegen ' : 'Auswärts bei ';

  document.getElementById('nm-teams').textContent = prefix + opponent;
  document.getElementById('nm-date').textContent  =
    WEEKDAYS[next.date.getDay()] + ' ' + next.dateStr +
    ' · ' + next.timeStr + ' Uhr · ' + next.label;

  const diff  = Math.round((new Date(next.date).setHours(0,0,0,0) - today) / 86400000);
  const dEl   = document.getElementById('nm-days');
  const uEl   = document.getElementById('nm-unit');

  if (diff === 0) {
    dEl.textContent = 'HEUTE'; dEl.className = 'nm-days today'; uEl.textContent = '';
  } else {
    dEl.textContent = diff;    dEl.className = 'nm-days';
    uEl.textContent = diff === 1 ? 'Tag' : 'Tage';
  }

  document.getElementById('next-match-box').style.display = 'flex';
}

/* ── Karten rendern ────────────────────────────────────────── */
function matchDateTime(date, timeStr) {
  const parts = (timeStr || '').match(/^(\d{1,2}):(\d{2})$/);
  const dt = new Date(date);
  if (parts) dt.setHours(+parts[1], +parts[2], 0, 0);
  return dt;
}

function countdownLabel(date, timeStr) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const matchDay = new Date(date); matchDay.setHours(0, 0, 0, 0);
  const days = Math.round((matchDay - today) / 86400000);
  if (days > 1) return 'In ' + days + ' Tagen';
  if (days === 1) return 'morgen';
  const mt = matchDateTime(date, timeStr);
  const diffMs = mt - new Date();
  if (diffMs > 0) {
    const h = Math.floor(diffMs / 3600000);
    const m = Math.floor((diffMs % 3600000) / 60000);
    const s = Math.floor((diffMs % 60000) / 1000);
    return 'in ' + String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }
  if (diffMs > -6 * 3600000) return 'läuft';
  return '';
}

function updateCountdowns() {
  document.querySelectorAll('.card-countdown[data-matchtime]').forEach(el => {
    const mt = new Date(+el.dataset.matchtime);
    const now = new Date();
    const diffMs = mt - now;
    const today = new Date(); today.setHours(0,0,0,0);
    const matchDay = new Date(mt); matchDay.setHours(0,0,0,0);
    const days = Math.round((matchDay - today) / 86400000);
    let txt = '', blink = false;
    if (days > 1) {
      txt = 'In ' + days + ' Tagen';
    } else if (days === 1) {
      txt = 'morgen';
    } else if (diffMs > 0) {
      const h = Math.floor(diffMs / 3600000);
      const m = Math.floor((diffMs % 3600000) / 60000);
      const s = Math.floor((diffMs % 60000) / 1000);
      txt = 'in ' + String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    } else if (diffMs > -6 * 3600000) {
      txt = 'läuft'; blink = true;
    }
    el.textContent = txt;
    el.classList.toggle('blink', blink);
  });
}

function isPast(date) {
  const t = new Date(); t.setHours(0, 0, 0, 0);
  const d = new Date(date); d.setHours(0, 0, 0, 0);
  return d < t;
}

function resultCls(result, isHome) {
  if (result === 'offen' || result === 'zurückgezogen') return 'open';
  const m = result.match(/^(\d+):(\d+)/);
  if (!m) return 'open';
  return (isHome ? +m[1] > +m[2] : +m[2] > +m[1]) ? 'win' : 'loss';
}

function resultTxt(result) {
  if (result === 'offen')          return '–';
  if (result === 'zurückgezogen')  return 'zurückgez.';
  return result;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMatches() {
  const container = document.getElementById('matches-container');

  const visible = allMatches.filter(m =>
    showTeams[m.team] &&
    (isPast(m.date) ? showPast : showFuture) &&
    (m.isHome ? showHome : showAway)
  );

  if (!visible.length) {
    container.innerHTML = '<div class="status-msg">Keine Spiele angezeigt.</div>';
    return;
  }

  const hasPast   = visible.some(m =>  isPast(m.date));
  const hasFuture = visible.some(m => !isPast(m.date));
  const showDivider = hasPast && hasFuture;

  container.innerHTML = visible.map((m, idx) => {
    const TEAM_CLS = { classic:'u15-classic','2er':'u15-2er',mixed:'mixed',u8:'u8-klein',u10:'u10-gross',d4:'d4',d30bz:'d30bz',d30kl:'d30kl',d40:'d40',d50:'d50',d60:'d60',h4:'h4',h30kl:'h30kl',h30k3:'h30k3',h40bk:'h40bk',h40kl:'h40kl',h50:'h50',h60:'h60',h65kl:'h65kl',h65ml:'h65ml' };
    const TAG_CLS  = { classic:'tag-classic','2er':'tag-2er',mixed:'tag-mixed',u8:'tag-u8',u10:'tag-u10',d4:'tag-d4',d30bz:'tag-d30bz',d30kl:'tag-d30kl',d40:'tag-d40',d50:'tag-d50',d60:'tag-d60',h4:'tag-h4',h30kl:'tag-h30kl',h30k3:'tag-h30k3',h40bk:'tag-h40bk',h40kl:'tag-h40kl',h50:'tag-h50',h60:'tag-h60',h65kl:'tag-h65kl',h65ml:'tag-h65ml' };
    const teamCls = TEAM_CLS[m.team] || 'u15-classic';
    const tagCls  = TAG_CLS[m.team]  || 'tag-classic';
    const past    = isPast(m.date);
    const extra   = (m.isHome ? ' home-game' : '') + (past ? ' past-game' : '');
    const tabelleBtn = `<button class="btn-tabelle" onclick="event.stopPropagation();showTable('${m.team}')">Tabelle</button>`;
    const wd      = WEEKDAYS[m.date.getDay()];

    const homeSpan = `<span class="team${m.isHome ? '' : ' opponent'}">${esc(m.homeTeam)}</span>`;
    const awaySpan = `<span class="team${m.isHome ? ' opponent' : ''}">${esc(m.awayTeam)}</span>`;

    const divider = (showDivider && !past && (idx === 0 || isPast(visible[idx - 1].date)))
      ? '<div class="past-divider"></div>'
      : '';

    const cardClick = m.reportUrl
      ? `onclick="showReport('${m.team}','${m.reportUrl}',allMatches.find(x=>x.reportUrl==='${m.reportUrl}'))" style="cursor:pointer"`
      : '';

    return divider + `<div class="card ${teamCls}${extra}" ${cardClick}>
  <div class="card-tag-row"><span class="tag ${tagCls}">${m.label}</span></div>
  <div class="card-top">
    <span class="card-date">${wd} ${m.dateStr}<span class="card-time"> · ${m.timeStr}</span></span>
    ${past ? '' : `<span class="card-countdown" data-matchtime="${matchDateTime(m.date, m.timeStr).getTime()}">${countdownLabel(m.date, m.timeStr)}</span>`}
    ${tabelleBtn}
  </div>
  <div class="card-match">${homeSpan}<span class="vs">vs.</span>${awaySpan}</div>
  <div class="card-bottom">
    <span class="note">${m.note ? esc(m.note) : ''}</span>
    <span class="result ${resultCls(m.result, m.isHome)}">${resultTxt(m.result)}</span>
  </div>
</div>`;
  }).join('\n');
}

/* ── Steuerung ─────────────────────────────────────────────── */
function toggleFilter(name) {
  const map = { showPast: 'btn-vergangen', showFuture: 'btn-aktuell', showHome: 'btn-heim', showAway: 'btn-auswaerts' };
  if (name === 'showPast')   showPast   = !showPast;
  if (name === 'showFuture') showFuture = !showFuture;
  if (name === 'showHome')   showHome   = !showHome;
  if (name === 'showAway')   showAway   = !showAway;
  document.getElementById(map[name]).classList.toggle('on',
    name === 'showPast' ? showPast : name === 'showFuture' ? showFuture : name === 'showHome' ? showHome : showAway
  );
  saveState();
  renderNextMatch();
  renderMatches();
}

function toggleTeam(team) {
  backToList();
  showTeams[team] = !showTeams[team];
  document.getElementById('btn-' + team).classList.toggle('on', showTeams[team]);
  saveState();
  autoSaveMeineAuswahl();
  renderNextMatch();
  renderMatches();
}

function applyStateToButtons() {
  document.getElementById('btn-vergangen').classList.toggle('on', showPast);
  document.getElementById('btn-aktuell').classList.toggle('on', showFuture);
  document.getElementById('btn-heim').classList.toggle('on', showHome);
  document.getElementById('btn-auswaerts').classList.toggle('on', showAway);
  LEAGUES.forEach(l => {
    document.getElementById('btn-' + l.team).classList.toggle('on', showTeams[l.team]);
  });
}

function toggleMannschaften() {
  const row = document.getElementById('team-row');
  const btn = document.getElementById('btn-mannschaften');
  const open = row.classList.toggle('visible');
  btn.classList.toggle('on', open);
}

function refreshData() { loadAllData(); }

/* ── Tabellen-Ansicht ──────────────────────────────────────── */
function parseStandingsTable(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  for (const table of doc.querySelectorAll('table')) {
    const text = table.textContent;
    if (text.includes('Rang') && text.includes('Mannschaft')) return table;
  }
  return null;
}

function showTable(team) {
  const league = LEAGUES.find(l => l.team === team);
  const html   = leagueHtml[team];
  if (!html || !league) return;

  const table = parseStandingsTable(html);
  if (!table) { alert('Tabelle noch nicht verfügbar.'); return; }

  const rows = [...table.querySelectorAll('tr')];
  let tableHtml = '<table class="standings-table"><thead>';

  for (const row of rows) {
    const isHeader = row.querySelectorAll('th').length > 0;
    if (isHeader) {
      const cells = [...row.querySelectorAll('th')];
      tableHtml += '<tr>' + cells.map(c => `<th>${esc(c.textContent.trim())}</th>`).join('') + '</tr>';
      tableHtml += '</thead><tbody>';
    } else {
      const cells = [...row.querySelectorAll('td')];
      if (cells.length < 3) continue;
      const rowText = row.textContent;
      const isOchtrup = rowText.includes('Ochtrup');
      tableHtml += `<tr${isOchtrup ? ' class="ochtrup-row"' : ''}>`;
      tableHtml += cells.map(c => `<td>${esc(c.textContent.trim())}</td>`).join('');
      tableHtml += '</tr>';
    }
  }
  tableHtml += '</tbody></table>';

  document.getElementById('detail-title').textContent = league.label + ' – Tabelle';
  document.getElementById('detail-table-container').innerHTML = tableHtml;

  document.getElementById('matches-container').style.display = 'none';
  document.getElementById('update-info').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  window.scrollTo(0, 0);
}

function backToList() {
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('report-view').style.display = 'none';
  document.getElementById('matches-container').style.display = '';
  document.getElementById('update-info').style.display = '';
}

let _reportTeam = '';

async function showReport(team, reportUrl, matchObj) {
  _reportTeam = team;
  document.getElementById('matches-container').style.display = 'none';
  document.getElementById('update-info').style.display = 'none';
  document.getElementById('detail-view').style.display = 'none';
  const rv = document.getElementById('report-view');
  rv.style.display = 'block';
  document.getElementById('report-content').innerHTML =
    '<div class="loading-row"><div class="spinner"></div>Spielbericht wird geladen …</div>';
  window.scrollTo(0, 0);

  try {
    const html = await fetchURL(reportUrl);
    document.getElementById('report-content').innerHTML = renderReport(html, matchObj);
  } catch(e) {
    document.getElementById('report-content').innerHTML =
      '<div class="status-msg">Spielbericht konnte nicht geladen werden.</div>';
  }
}

function showTableFromReport() {
  document.getElementById('report-view').style.display = 'none';
  showTable(_reportTeam);
}

function renderReport(html, m) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  let out = '';

  /* ── Header ── */
  out += `<div class="report-match-header">
    <div class="report-teams">${esc(m.homeTeam)} vs. ${esc(m.awayTeam)}</div>
    <div class="report-result">${m.result}</div>
    <div class="report-date">${WEEKDAYS[m.date.getDay()]} ${m.dateStr} · ${m.timeStr} Uhr · ${m.label}</div>
  </div>`;

  /* ── Tabellen aus dem HTML extrahieren ── */
  const allTables = [...doc.querySelectorAll('table')];
  const matchTables = allTables.filter(t => {
    const txt = t.textContent;
    return (txt.includes('Satz') || txt.includes('LK')) && t.rows.length > 1;
  });

  if (!matchTables.length) {
    out += '<div class="status-msg">Keine Detaildaten gefunden.</div>';
    return out;
  }

  /* liga.nu packt alles in EINE Tabelle; einzellige "Einzelspiele"/"Doppelspiele"-Zeilen trennen Abschnitte */
  const bigTable = matchTables[0];
  const sections = [];
  let curSection = null;
  for (const row of bigTable.rows) {
    const cells = [...row.cells];
    if (cells.length === 1) {
      const txt = cells[0].textContent.trim();
      if (txt === 'Einzelspiele' || txt === 'Doppelspiele') {
        curSection = { label: txt, rows: [] };
        sections.push(curSection);
        continue;
      }
    }
    if (curSection) curSection.rows.push(row);
  }
  if (!sections.length) sections.push({ label: '', rows: [...bigTable.rows] });

  for (const section of sections) {
    const isDoppel = section.label === 'Doppelspiele';
    if (section.label) out += `<div class="report-section">${esc(section.label)}</div>`;
    out += '<table class="report-table"><thead>';

    let inBody = false;
    for (const row of section.rows) {
      const cells = [...row.cells];
      if (!cells.length) continue;
      const isHeader = row.querySelectorAll('th').length > 0;

      if (!inBody && !isHeader) { out += '</thead><tbody>'; inBody = true; }

      const lblCell = cells[0]?.textContent.trim() || '';
      const isTotal   = /^(einzel|doppel|gesamt)$/i.test(lblCell);
      const isOchtrup = row.textContent.includes('Ochtrup') || row.textContent.includes('Nitsche');

      if (isHeader) {
        out += '<tr>' + cells.map(c => {
          const txt = c.textContent.trim();
          const isScoreCol = /satz|matches|sätze|games/i.test(txt);
          /* Teamnamen-Zellen bekommen colspan=3 (Nr + Name + leer), damit Spalten korrekt ausgerichtet sind */
          const span = isScoreCol ? (c.colSpan > 1 ? c.colSpan : 1) : Math.max(c.colSpan || 1, 3);
          const cs = span > 1 ? ` colspan="${span}"` : '';
          const rs = c.rowSpan > 1 ? ` rowspan="${c.rowSpan}"` : '';
          return `<th${cs}${rs}>${esc(txt)}</th>`;
        }).join('') + '</tr>';

      } else if (isDoppel && !isTotal && cells.length >= 10) {
        /* Kombinierte Doppel-Zeile aufteilen: "3"-Zellen entfernen, pro Spieler eine Zeile */
        const filtered = cells.filter((_, i) => i !== 1 && i !== 4);
        const splitNl  = t => t.split('\n').map(s => s.trim()).filter(s => s && s !== '...');
        const homeSeeds   = splitNl(filtered[0]?.textContent || '');
        const homePlayers = splitNl(filtered[1]?.textContent || '');
        const awaySeeds   = splitNl(filtered[2]?.textContent || '');
        const awayPlayers = splitNl(filtered[3]?.textContent || '');
        const scoresCells = filtered.slice(4);
        const numPairs    = Math.max(homePlayers.length, awayPlayers.length, 1);
        for (let i = 0; i < numPairs; i++) {
          /* "(Zahl)"-Klammern aus Doppel-Namen entfernen */
          const hName = esc((homePlayers[i] || '').replace(/\s*\(\d+\)\s*/g, '').trim());
          const aName = esc((awayPlayers[i] || '').replace(/\s*\(\d+\)\s*/g, '').trim());
          const cls = isOchtrup ? ' class="ochtrup-player"' : '';
          out += `<tr${cls}>`;
          out += `<td>${esc(homeSeeds[i] || '')}</td><td style="text-align:left">${hName}</td><td></td>`;
          out += `<td>${esc(awaySeeds[i] || '')}</td><td style="text-align:left">${aName}</td><td></td>`;
          if (i === 0) {
            scoresCells.forEach(sc => {
              const t = sc.textContent.trim();
              if (/^\d+:\d+$/.test(t)) {
                const [a, b] = t.split(':').map(Number);
                const win = m.isHome ? a > b : b > a;
                out += `<td><span class="${win ? 'set-win' : 'set-loss'}">${esc(t)}</span></td>`;
              } else {
                out += `<td>${esc(t)}</td>`;
              }
            });
          }
          out += '</tr>';
        }

      } else {
        const cls = isTotal ? ' class="total-row"' : isOchtrup ? ' class="ochtrup-player"' : '';
        out += `<tr${cls}>` + cells.map(c => {
          const origTxt = c.textContent.trim();
          const cs = c.colSpan > 1 ? ` colspan="${c.colSpan}"` : '';
          /* Spielername (hat Buchstaben und Klammer): <br> vor "(" für zweite Zeile */
          if (!isTotal && /[a-zA-ZäöüÄÖÜß]/.test(origTxt) && origTxt.includes('(')) {
            const idx = origTxt.indexOf('(');
            return `<td${cs}>${esc(origTxt.slice(0, idx).trim())}<br>${esc(origTxt.slice(idx))}</td>`;
          }
          let txt = esc(origTxt);
          if (/^\d+:\d+$/.test(origTxt)) {
            const [a, b] = origTxt.split(':').map(Number);
            const win = m.isHome ? a > b : b > a;
            txt = `<span class="${win ? 'set-win' : 'set-loss'}">${txt}</span>`;
          }
          return `<td${cs}>${txt}</td>`;
        }).join('') + '</tr>';
      }
    }

    if (!inBody) out += '</thead><tbody>';
    out += '</tbody></table>';
  }

  return out;
}


/* ── Alle / Keine auswählen ────────────────────────────────── */
function selectAllTeams() {
  LEAGUES.forEach(l => {
    showTeams[l.team] = true;
    document.getElementById('btn-' + l.team).classList.add('on');
  });
  saveState();
  renderNextMatch();
  renderMatches();
}

function selectNoTeams() {
  LEAGUES.forEach(l => {
    showTeams[l.team] = false;
    document.getElementById('btn-' + l.team).classList.remove('on');
  });
  saveState();
  renderNextMatch();
  renderMatches();
}

/* ── Meine Auswahl ─────────────────────────────────────────── */
let meineAuswahlActive = false;

function loadMeineAuswahl() {
  try { return JSON.parse(localStorage.getItem('spielplan-meine-auswahl')); }
  catch { return null; }
}

function autoSaveMeineAuswahl() {
  if (!meineAuswahlActive) return;
  localStorage.setItem('spielplan-meine-auswahl', JSON.stringify({ ...showTeams }));
}

function toggleMeineAuswahlMode() {
  if (!meineAuswahlActive) {
    meineAuswahlActive = true;
    document.getElementById('btn-meine-auswahl').classList.add('on');
  }
  const saved = loadMeineAuswahl();
  if (saved) {
    LEAGUES.forEach(l => {
      const val = saved[l.team] !== undefined ? saved[l.team] : true;
      showTeams[l.team] = val;
      document.getElementById('btn-' + l.team).classList.toggle('on', val);
    });
    saveState();
    renderNextMatch();
    renderMatches();
  } else {
    LEAGUES.forEach(l => {
      showTeams[l.team] = false;
      document.getElementById('btn-' + l.team).classList.remove('on');
    });
    autoSaveMeineAuswahl();
    saveState();
    renderNextMatch();
    renderMatches();
  }
}

/* ── Meine Auswahl: Langdruck (1s) löscht gespeicherte Auswahl */
(function() {
  const btn = document.getElementById('btn-meine-auswahl');
  let pressTimer = null;
  let longPressFired = false;
  let isTouch = false;

  function startTimer() {
    longPressFired = false;
    pressTimer = setTimeout(function() {
      if (!meineAuswahlActive) return;
      longPressFired = true;
      localStorage.removeItem('spielplan-meine-auswahl');
      meineAuswahlActive = false;
      btn.classList.remove('on');
    }, 3000);
  }

  function cancelTimer() {
    clearTimeout(pressTimer);
    pressTimer = null;
  }

  /* Touch: preventDefault verhindert iOS-Kontextmenü und synthetische Mouse-Events */
  btn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    isTouch = true;
    startTimer();
  });

  btn.addEventListener('touchend', function(e) {
    e.preventDefault();
    cancelTimer();
    if (!longPressFired) toggleMeineAuswahlMode();
    longPressFired = false;
    setTimeout(function() { isTouch = false; }, 600);
  });

  btn.addEventListener('touchcancel', function() {
    cancelTimer();
    longPressFired = false;
    setTimeout(function() { isTouch = false; }, 600);
  });

  /* Maus (Desktop) */
  btn.addEventListener('mousedown',  function() { if (!isTouch) startTimer(); });
  btn.addEventListener('mouseup',    function() { if (!isTouch) cancelTimer(); });
  btn.addEventListener('mouseleave', function() { if (!isTouch) cancelTimer(); });
  btn.addEventListener('click',      function() {
    if (isTouch) return;
    if (!longPressFired) toggleMeineAuswahlMode();
    longPressFired = false;
  });
})();

/* ── Start ─────────────────────────────────────────────────── */
applyStateToButtons();
loadAllData();
setInterval(updateCountdowns, 1000);
