<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TC 1928 Ochtrup – Spielplan 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f1117;
    font-family: 'DM Sans', sans-serif;
    color: #e8eaf0;
    padding: 24px 16px 48px;
    max-width: 640px;
    margin: 0 auto;
  }

  .header { text-align: center; margin-bottom: 20px; }
  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 0.08em;
    color: #fff;
    line-height: 1;
  }
  .header p {
    color: #7a7f96;
    font-size: 0.75rem;
    margin-top: 5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ── Next match box ── */
  .next-match-box {
    background: #1a1d2e;
    border: 1px solid #252840;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 14px;
    display: none;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .nm-label {
    font-size: 0.63rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #555a7a;
    margin-bottom: 5px;
  }
  .nm-teams {
    font-size: 0.92rem;
    font-weight: 600;
    color: #fff;
    line-height: 1.3;
  }
  .nm-date { font-size: 0.75rem; color: #7a7f96; margin-top: 3px; }
  .nm-right { text-align: right; flex-shrink: 0; }
  .nm-days {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.6rem;
    line-height: 1;
    color: #7ab3ff;
  }
  .nm-days.today { font-size: 1.5rem; color: #7effa8; }
  .nm-unit {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #555a7a;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
    align-items: center;
  }
  .btn {
    padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid #2e3150;
    background: transparent;
    color: #555a7a;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.71rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
    user-select: none;
  }
  .btn:hover { background: #1a1d2e; color: #9095b0; border-color: #444a68; }

  .btn-past.on   { border-color: #9095b0; color: #9095b0; background: rgba(144,149,176,0.08); }
  .btn-classic.on{ border-color: #7ab3ff; color: #7ab3ff; background: rgba(30,90,200,0.12); }
  .btn-2er.on    { border-color: #7effa8; color: #7effa8; background: rgba(30,160,80,0.12); }
  .btn-mixed.on  { border-color: #ffe57f; color: #ffe57f; background: rgba(200,170,20,0.12); }

  .btn-refresh {
    margin-left: auto;
    font-size: 1rem;
    padding: 3px 10px;
    letter-spacing: 0;
  }
  .btn-refresh:disabled { opacity: 0.4; cursor: default; }
  .btn-refresh.spinning { animation: spin 0.7s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Legend ── */
  .legend {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 12px;
    margin-bottom: 20px;
    background: #1a1d2e;
    border-radius: 12px;
    padding: 12px 14px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.78rem;
    color: #b0b3c4;
  }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .legend-home-box {
    width: 12px; height: 12px;
    border-radius: 3px;
    border: 2px solid #e040fb;
    flex-shrink: 0;
  }

  /* ── Cards ── */
  .card {
    border-radius: 12px;
    margin-bottom: 10px;
    padding: 12px 14px;
    border: 1px solid transparent;
  }
  .card.u15-classic { background: rgba(30,90,200,0.2);  border-color: rgba(30,90,200,0.25); }
  .card.u15-2er     { background: rgba(30,160,80,0.2);  border-color: rgba(30,160,80,0.25); }
  .card.mixed       { background: rgba(200,170,20,0.2); border-color: rgba(200,170,20,0.25); }
  .card.home-game   { border-color: #e040fb !important; border-width: 2px; }
  .card.past-game   { opacity: 0.55; }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    gap: 8px;
  }
  .card-date {
    font-size: 0.78rem;
    color: #9095b0;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .card-time { font-size: 0.75rem; color: #666a85; margin-left: 4px; }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    justify-content: flex-end;
    flex-wrap: wrap;
  }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .tag-classic { background: rgba(30,90,200,0.4);  color: #7ab3ff; border: 1px solid #3060c0; }
  .tag-2er     { background: rgba(30,160,80,0.4);  color: #7effa8; border: 1px solid #2a9050; }
  .tag-mixed   { background: rgba(200,170,20,0.4); color: #ffe57f; border: 1px solid #a08800; }

  .home-badge {
    font-size: 0.65rem;
    font-weight: 600;
    color: #e040fb;
    border: 1px solid #e040fb;
    border-radius: 4px;
    padding: 1px 5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .card-match {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    row-gap: 2px;
  }
  .team          { font-size: 0.92rem; font-weight: 600; color: #fff; line-height: 1.3; }
  .team.opponent { font-weight: 400; color: #c0c4d8; }
  .vs { font-size: 0.75rem; color: #555a7a; font-style: italic; margin: 0 6px; flex-shrink: 0; }

  .result { font-size: 1.05rem; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .result.win  { color: #7effa8; }
  .result.loss { color: #ff7a7a; }
  .result.open { color: #444a68; font-style: italic; font-weight: 400; font-size: 0.9rem; }

  .note {
    font-size: 0.7rem;
    color: #555a7a;
    font-style: italic;
  }

  .card-bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-top: 6px;
  }

  /* ── Status ── */
  .status-msg {
    text-align: center;
    color: #555a7a;
    padding: 32px 16px;
    font-size: 0.85rem;
  }
  .loading-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: #555a7a;
    padding: 32px 16px;
    font-size: 0.85rem;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid #2e3150;
    border-top-color: #7ab3ff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  .error-msg {
    background: rgba(255,80,80,0.07);
    border: 1px solid rgba(255,80,80,0.22);
    border-radius: 10px;
    padding: 12px 14px;
    color: #ff9090;
    font-size: 0.77rem;
    margin-bottom: 12px;
    line-height: 1.6;
  }
  .error-msg code {
    font-family: monospace;
    background: rgba(255,255,255,0.08);
    padding: 1px 5px;
    border-radius: 3px;
  }
  .update-info {
    text-align: center;
    font-size: 0.63rem;
    color: #333650;
    margin-top: 24px;
    letter-spacing: 0.04em;
  }
</style>

<body>

<div class="header">
  <h1>TC 1928 Ochtrup</h1>
  <p>Spielplan · Münsterland · Sommer 2026</p>
</div>

<!-- Nächstes Spiel -->
<div id="next-match-box" class="next-match-box">
  <div>
    <div class="nm-label">Nächstes Spiel</div>
    <div class="nm-teams" id="nm-teams"></div>
    <div class="nm-date"  id="nm-date"></div>
  </div>
  <div class="nm-right">
    <div class="nm-days" id="nm-days"></div>

</div>

<!-- Filter-Buttons -->
<div class="controls">
  <button class="btn btn-past"    id="btn-past"    onclick="togglePast()">Vergangene ausblenden</button>
  <button class="btn btn-classic on" id="btn-classic" onclick="toggleTeam('classic')">U15 classic</button>
  <button class="btn btn-2er on"  id="btn-2er"     onclick="toggleTeam('2er')">U15 2er</button>
  <button class="btn btn-mixed on" id="btn-mixed"  onclick="toggleTeam('mixed')">U15 2er Mixed</button>

  <div class="legend-item">

  </div>

<!-- Diagnose-Panel -->
<div style="margin-top:32px;border-top:1px solid #1e2238;padding-top:16px;">
  <button class="btn" onclick="runDiagnose()" id="btn-diag" style="font-size:0.7rem;">🔍 Diagnose anzeigen</button>
  <pre id="diag-out" style="display:none;margin-top:12px;background:#0a0c14;border:1px solid #1e2238;border-radius:8px;padding:12px;font-size:0.68rem;color:#7a7f96;white-space:pre-wrap;word-break:break-all;max-height:400px;overflow-y:auto;"></pre>
</div>

<script>
/* ── Konfiguration ─────────────────────────────────────────── */
const LEAGUES = [
  {
    url:   'https://wtv.liga.nu/cgi-bin/WebObjects/nuLigaTENDE.woa/wa/groupPage?targetFed=WTV&championship=MS+2026&group=249',
    team:  'classic',
    label: 'U15 classic'
  },
  {
    url:   'https://wtv.liga.nu/cgi-bin/WebObjects/nuLigaTENDE.woa/wa/groupPage?targetFed=WTV&championship=MS+2026&group=237',
    team:  '2er',
    label: 'U15 2er'
  },
  {
    url:   'https://wtv.liga.nu/cgi-bin/WebObjects/nuLigaTENDE.woa/wa/groupPage?targetFed=WTV&championship=MS+2026&group=194',
    team:  'mixed',
    label: 'Mixed U15'
  }
];

const WEEKDAYS = ['So.','Mo.','Di.','Mi.','Do.','Fr.','Sa.'];

/* ── Zustand ───────────────────────────────────────────────── */
let allMatches  = [];
let hidePast    = false;
let showTeams   = { classic: true, '2er': true, mixed: true };

/* ── Fetch ─────────────────────────────────────────────────── */
async function fetchURL(targetUrl, proxyOrder = [0, 1, 2]) {
  const encoded = encodeURIComponent(targetUrl);

  const PROXIES = [
    async () => {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 12000);
      try {
        const res = await fetch('https://api.allorigins.win/get?url=' + encoded, { signal: ctrl.signal });
        clearTimeout(timer);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const json = await res.json();
        if (!json.contents || json.contents.length < 1000) throw new Error('Zu kurz');
        return json.contents;
      } catch(e) { clearTimeout(timer); throw e; }
    },
    async () => {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 12000);
      try {
        const res = await fetch('https://corsproxy.io/?' + encoded, { signal: ctrl.signal });
        clearTimeout(timer);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        if (text.length < 1000) throw new Error('Zu kurz');
        return text;
      } catch(e) { clearTimeout(timer); throw e; }
    },
    async () => {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 12000);
      try {
        const res = await fetch('https://api.allorigins.win/raw?url=' + encoded, { signal: ctrl.signal });
        clearTimeout(timer);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        if (text.length < 500) throw new Error('Zu kurz (' + text.length + ' B)');
        return text;
      } catch(e) { clearTimeout(timer); throw e; }
    }
  ];

  let lastErr;
  for (const idx of proxyOrder) {
    try { return await PROXIES[idx](); } catch(e) { lastErr = e; }
  }
  throw lastErr;
}

/* ── Parse ─────────────────────────────────────────────────── */
function toDate(ddmmyyyy) {
  const m = ddmmyyyy.match(/(\d{2})\.(\d{2})\.(\d{4})/);
  return m ? new Date(+m[3], +m[2] - 1, +m[1]) : null;
}

/* Gibt true zurück wenn der Text kein Datum, keine Uhrzeit, kein Ergebnis und kein Status ist */
function looksLikeTeam(t) {
  if (!t || t.length < 4)          return false;  // "Fr.", "Mo." etc. herausfiltern
  if (/\d{2}\.\d{2}\.\d{4}/.test(t)) return false;   // Datum
  if (/^\d{2}:\d{2}$/.test(t))     return false;     // Uhrzeit
  if (/^\d+:\d+$/.test(t))         return false;     // Ergebnis
  const low = t.toLowerCase();
  if (low === 'offen' || low === 'anzeigen' || low.includes('zurückgezogen')) return false;
  return true;
}

function parseLeague(html, league) {
  const doc     = new DOMParser().parseFromString(html, 'text/html');
  const matches = [];
  let lastDateStr = '';
  let lastTimeStr = '??:??';

  for (const row of doc.querySelectorAll('table tr')) {
    const cells = [...row.querySelectorAll('td')];
    if (cells.length < 3) continue;

    const texts = cells.map(c => c.textContent.trim());

    /* Datum aus JEDER Zeile lesen und vorwärts merken.
       liga.nu zeigt das Datum oft nur in einer Kopfzeile, die nachfolgenden
       Spielzeilen haben dann leere Datumszellen. */
    for (const t of texts) {
      const m = t.match(/(\d{2}\.\d{2}\.\d{4})/);
      if (m) {
        lastDateStr = m[1];
        const tm = t.match(/(\d{2}:\d{2})/);
        lastTimeStr = tm ? tm[1] : '??:??';
        break;
      }
    }

    /* Ochtrup in dieser Zeile? */
    if (!texts.some(t => t.includes('Ochtrup'))) continue;

    /* Zuletzt gesehenes Datum und Uhrzeit verwenden */
    const dateStr = lastDateStr;
    const timeStr = lastTimeStr;
    if (!dateStr) continue;

    /* Die ersten zwei Team-ähnlichen Zellen = Heim / Gast */
    const teamTexts = texts.filter(looksLikeTeam);
    if (teamTexts.length < 2) continue;

    const homeTeam = teamTexts[0];
    const awayTeam = teamTexts[1];

    if (!homeTeam.includes('Ochtrup') && !awayTeam.includes('Ochtrup')) continue;

    /* Ergebnis: erste Zelle die genau X:Y enthält (keine Sub-Ergebnisse) */
    let result = 'offen';
    for (const t of texts) {
      if (/^\d+:\d+$/.test(t)) { result = t; break; }
    }
    if (result === 'offen') {
      for (const t of texts) {
        if (t.toLowerCase().includes('zurückgezogen')) { result = 'zurückgezogen'; break; }
      }
    }

    /* Verlegungshinweis erkennen */
    let note = '';
    for (const t of texts) {
      if (t.toLowerCase().startsWith('ursprünglich')) { note = t; break; }
    }

    const date = toDate(dateStr);
    if (!date) continue;

    matches.push({
      dateStr, timeStr, date,
      homeTeam, awayTeam, result, note,
      isHome: homeTeam.includes('Ochtrup'),
      team:   league.team,
      label:  league.label
    });
  }

  console.log('[' + league.label + '] ' + html.length +
    ' B | Ochtrup: ' + html.includes('Ochtrup') +
    ' | gefunden: ' + matches.length);

  return matches;
}

/* ── Laden ─────────────────────────────────────────────────── */
async function loadAllData() {
  const errBanner = document.getElementById('error-banner');
  const loadBanner = document.getElementById('loading-banner');
  const refreshBtn = document.getElementById('btn-refresh');

  errBanner.style.display  = 'none';
  loadBanner.style.display = 'flex';
  document.getElementById('matches-container').innerHTML = '';
  document.getElementById('next-match-box').style.display = 'none';
  document.getElementById('update-info').style.display = 'none';
  refreshBtn.disabled = true;
  refreshBtn.classList.add('spinning');

  /* Parallel laden – jede Liga nutzt einen anderen primären Proxy,
     damit kein einzelner Dienst dreimal gleichzeitig getroffen wird */
  let matches = [];
  const errors = [];

  const results = await Promise.allSettled(
    LEAGUES.map((league, i) => {
      const order = [(i % 3), ((i + 1) % 3), ((i + 2) % 3)];
      return fetchURL(league.url, order).then(html => parseLeague(html, league));
    })
  );

  for (let i = 0; i < results.length; i++) {
    if (results[i].status === 'fulfilled') {
      matches.push(...results[i].value);
    } else {
      errors.push(LEAGUES[i].label + ': ' + results[i].reason.message);
    }
  }

  refreshBtn.disabled = false;
  refreshBtn.classList.remove('spinning');
  loadBanner.style.display = 'none';

  matches.sort((a, b) => a.date - b.date);
  allMatches = matches;

  if (errors.length) {
    errBanner.innerHTML =
      '<strong>⚠ Fehler beim Laden:</strong><br>' + errors.join('<br>') +
      '<br><br>Öffne die Datei über einen lokalen Webserver, z.B.:<br>' +
      '<code>python3 -m http.server</code> &nbsp;·&nbsp; dann <code>http://localhost:8000</code>';
    errBanner.style.display = 'block';
  }

  if (!matches.length) {
    const diag = results.map((r, i) =>
      LEAGUES[i].label + ': ' + (r.status === 'fulfilled'
        ? '0 Spiele gefunden (HTML-Struktur unbekannt)'
        : r.reason.message)
    ).join('<br>');
    errBanner.innerHTML =
      '<strong>⚠ Keine Spieldaten gefunden</strong><br>' + diag +
      '<br><br>Mögliche Ursache: liga.nu blockiert den CORS-Proxy.<br>' +
      'Öffne die Browser-Konsole (F12 → Console) für Details.';
    errBanner.style.display = 'block';
    document.getElementById('matches-container').innerHTML = '';
    return;
  }

  const ui = document.getElementById('update-info');
  const now = new Date();
  ui.textContent = 'Zuletzt aktualisiert: ' +
    now.toLocaleDateString('de-DE') + ' · ' +
    now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }) + ' Uhr';
  ui.style.display = 'block';

  renderNextMatch();
  renderMatches();
}

/* ── Nächstes Spiel ────────────────────────────────────────── */
function renderNextMatch() {
  const today = new Date(); today.setHours(0, 0, 0, 0);

  const next = allMatches.find(m => {
    const d = new Date(m.date); d.setHours(0, 0, 0, 0);
    return d >= today && m.result !== 'zurückgezogen';
  });
  if (!next) return;

  const opponent = next.isHome ? next.awayTeam : next.homeTeam;
  const prefix   = next.isHome ? 'Heim gegen ' : 'Auswärts bei ';

  document.getElementById('nm-teams').textContent = prefix + opponent;
  document.getElementById('nm-date').textContent  =
    WEEKDAYS[next.date.getDay()] + ' ' + next.dateStr +
    ' · ' + next.timeStr + ' Uhr · ' + next.label;

  const diff  = Math.round((new Date(next.date).setHours(0,0,0,0) - today) / 86400000);
  const dEl   = document.getElementById('nm-days');
  const uEl   = document.getElementById('nm-unit');

  if (diff === 0) {
    dEl.textContent = 'HEUTE'; dEl.className = 'nm-days today'; uEl.textContent = '';
  } else {
    dEl.textContent = diff;    dEl.className = 'nm-days';
    uEl.textContent = diff === 1 ? 'Tag' : 'Tage';
  }

  document.getElementById('next-match-box').style.display = 'flex';
}

/* ── Karten rendern ────────────────────────────────────────── */
function isPast(date) {
  const t = new Date(); t.setHours(0, 0, 0, 0);
  const d = new Date(date); d.setHours(0, 0, 0, 0);
  return d < t;
}

function resultCls(result, isHome) {
  if (result === 'offen' || result === 'zurückgezogen') return 'open';
  const m = result.match(/^(\d+):(\d+)/);
  if (!m) return 'open';
  return (isHome ? +m[1] > +m[2] : +m[2] > +m[1]) ? 'win' : 'loss';
}

function resultTxt(result) {
  if (result === 'offen')          return '–';
  if (result === 'zurückgezogen')  return 'zurückgez.';
  return result;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMatches() {
  const container = document.getElementById('matches-container');

  const visible = allMatches.filter(m =>
    showTeams[m.team] && !(hidePast && isPast(m.date))
  );

  if (!visible.length) {
    container.innerHTML = '<div class="status-msg">Keine Spiele angezeigt.</div>';
    return;
  }

  container.innerHTML = visible.map(m => {
    const teamCls = m.team === '2er' ? 'u15-2er' : m.team === 'mixed' ? 'mixed' : 'u15-classic';
    const tagCls  = m.team === '2er' ? 'tag-2er'  : m.team === 'mixed' ? 'tag-mixed' : 'tag-classic';
    const extra   = (m.isHome ? ' home-game' : '') + (isPast(m.date) ? ' past-game' : '');
    const badge   = m.isHome ? '<span class="home-badge">Heim</span>' : '';
    const wd      = WEEKDAYS[m.date.getDay()];

    const homeSpan = `<span class="team${m.isHome ? '' : ' opponent'}">${esc(m.homeTeam)}</span>`;
    const awaySpan = `<span class="team${m.isHome ? ' opponent' : ''}">${esc(m.awayTeam)}</span>`;

    return `<div class="card ${teamCls}${extra}">
  <div class="card-top">
    <span class="card-date">${wd} ${m.dateStr}<span class="card-time"> · ${m.timeStr}</span></span>
    <div class="card-meta">${badge}<span class="tag ${tagCls}">${m.label}</span></div>
  </div>
  <div class="card-match">${homeSpan}<span class="vs">vs.</span>${awaySpan}</div>
  <div class="card-bottom">
    <span class="note">${m.note ? esc(m.note) : ''}</span>
    <span class="result ${resultCls(m.result, m.isHome)}">${resultTxt(m.result)}</span>
  </div>
</div>`;
  }).join('\n');
}

/* ── Steuerung ─────────────────────────────────────────────── */
function togglePast() {
  hidePast = !hidePast;
  const btn = document.getElementById('btn-past');
  btn.classList.toggle('on', hidePast);
  btn.textContent = hidePast ? 'Vergangene einblenden' : 'Vergangene ausblenden';
  renderMatches();
}

function toggleTeam(team) {
  showTeams[team] = !showTeams[team];
  document.getElementById('btn-' + team).classList.toggle('on', showTeams[team]);
  renderMatches();
}

function refreshData() { loadAllData(); }

/* ── Diagnose ──────────────────────────────────────────────── */
async function runDiagnose() {
  const out = document.getElementById('diag-out');
  const btn = document.getElementById('btn-diag');
  out.style.display = 'block';
  out.textContent = 'Lade Diagnose …';
  btn.disabled = true;

  let report = '';

  for (let li = 0; li < LEAGUES.length; li++) {
    if (li > 0) { report += '\n'; await new Promise(r => setTimeout(r, 2000)); }
    const league = LEAGUES[li];
    report += '\u2550\u2550 ' + league.label + ' \u2550\u2550\n';
    out.textContent = report;

    try {
      const encoded = encodeURIComponent(league.url);
      const ctrl = new AbortController();
      setTimeout(() => ctrl.abort(), 20000);
      const r   = await fetch('https://api.allorigins.win/get?url=' + encoded, { signal: ctrl.signal });
      const j   = await r.json();
      const html = j.contents || '';

      report += 'HTTP: ' + (j.status && j.status.http_code) + ' | ' + html.length + ' B | Ochtrup: ' + html.includes('Ochtrup') + '\n\n';

      const doc  = new DOMParser().parseFromString(html, 'text/html');
      let rowNum = 0;

      for (const row of doc.querySelectorAll('table tr')) {
        if (!row.textContent.includes('Ochtrup')) continue;
        rowNum++;
        const cells = [...row.querySelectorAll('td')];
        report += 'Zeile ' + rowNum + ' (' + cells.length + ' Zellen):\n';
        cells.forEach((c, i) => {
          const t = c.textContent.trim().replace(/\u00a0/g, '[nbsp]');
          report += '  [' + i + '] "' + t.substring(0, 60) + '"\n';
        });
        report += '\n';
      }
      if (rowNum === 0) report += '\u2192 Keine Ochtrup-Zeile gefunden!\n';

    } catch(e) {
      report += 'Fehler: ' + e.message + '\n';
    }
  }

  out.textContent = report;
  btn.disabled = false;
}

/* ── Start ─────────────────────────────────────────────────── */
loadAllData();
